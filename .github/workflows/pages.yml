name: Publicar Folha Certa

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obter ficheiros
        uses: actions/checkout@v4
      - name: Preparar Pages
        uses: actions/configure-pages@v5
      - name: Enviar aplicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: FOLHA-CERTA-GITHUB
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
